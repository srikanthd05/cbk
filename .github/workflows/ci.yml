name: Pull webMethods Image

on:
  workflow_dispatch:

jobs:
  pull-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Pull image
        run: |
          docker pull 306240/webmintegrationserver:1.3

      - name: Verify image
        run: |
          docker images

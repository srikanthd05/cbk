name: Pull webMethods Image

on:
  workflow_dispatch:

jobs:
  pull-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ibmwebmethods.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull image
        run: |
          docker pull 306240/webmintegrationserver:1.3

      - name: Verify image
        run: |
          docker images
